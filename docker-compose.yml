# ContextAI — full stack in one command:  docker compose up --build
#
# Requires Ollama running on the HOST machine (e.g. `ollama serve`). The
# containers reach it via host.docker.internal. Override OLLAMA_HOSTS (and the
# optional DISCORD_BOT_TOKEN) by copying .env.docker.example to .env.
#
# After it's up:
#   UI        -> http://localhost:5173
#   WhatsApp  -> http://localhost:8002
#   Discord   -> http://localhost:8004
#   RAG       -> http://localhost:3000

services:
  rag:
    build:
      context: .
      dockerfile: server/Dockerfile
    image: contextai-rag
    container_name: contextai-rag
    environment:
      OLLAMA_HOSTS: ${OLLAMA_HOSTS:-http://host.docker.internal:11434}
      RAG_STORE_FILE: /app/data/rag_store.json
      PORT: "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - rag-data:/app/data
    ports:
      - "3000:3000"
    restart: unless-stopped

  whatsapp:
    build: ./backend
    image: contextai-backend
    container_name: contextai-whatsapp
    command: node whatsapp_api.js
    init: true
    shm_size: "1gb"
    environment:
      OLLAMA_HOSTS: ${OLLAMA_HOSTS:-http://host.docker.internal:11434}
      RAG_SERVER_URL: http://rag:3000
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - wa-auth:/app/.wwebjs_auth
      - wa-cache:/app/.wwebjs_cache
    ports:
      - "8002:8002"
    depends_on:
      - rag
    restart: unless-stopped

  discord:
    build: ./backend
    image: contextai-backend
    container_name: contextai-discord
    command: node discord_api.js
    init: true
    environment:
      OLLAMA_HOSTS: ${OLLAMA_HOSTS:-http://host.docker.internal:11434}
      RAG_SERVER_URL: http://rag:3000
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8004:8004"
    depends_on:
      - rag
    restart: unless-stopped

  ui:
    build: ./backend/whatsapp_ui
    image: contextai-ui
    container_name: contextai-ui
    ports:
      - "5173:80"
    depends_on:
      - whatsapp
      - discord
      - rag
    restart: unless-stopped

volumes:
  rag-data:
  wa-auth:
  wa-cache:
